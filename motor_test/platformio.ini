; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.03/platform-espressif32.zip
board = esp32dev
framework = arduino
board_microros_transport = udp
monitor_speed = 115200
build_type = debug
build_flags = 
	-L ./.pio/libdeps/esp32dev/micro_ros_arduino/src/esp32/
	-l microros
	-D ESP32
	-std=gnu++2a
	-DCORE_DEBUG_LEVEL=4
build_unflags = 
	-std=gnu++11
	-std=gnu++14
	-std=gnu++17
lib_compat_mode = strict
lib_ldf_mode = chain
upload_protocol = esptool
monitor_filters = direct, esp32_exception_decoder
lib_deps = 
	hideakitai/ArduinoEigen@^0.3.2
	robtillaart/INA226@^0.6.6
	mirs240x/micro_ros_arduino@^2.0.7-humble
	networking-for-arduino/EthernetESP32@^1.0.2
